<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copilot File Renderer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-shell">
    <!-- Header -->
    <div class="popup-header">
      <div class="popup-header-noise"></div>
      <div class="popup-header-shimmer"></div>
      <div class="popup-header-inner">
        <div class="popup-logo">🤖</div>
        <div>
          <div class="popup-brand">Copilot File Renderer</div>
          <div class="popup-tagline">Enhanced previews for GitHub Copilot files</div>
        </div>
      </div>
    </div>

    <!-- File types -->
    <div class="popup-section">
      <div class="popup-section-title">Supported Types</div>
      <div class="file-grid">
        <div class="file-card file-card--agent">
          <span class="file-card-icon">🤖</span>
          <div class="file-card-info">
            <span class="file-card-name">Agent</span>
            <code class="file-card-ext">.agent.md</code>
          </div>
        </div>
        <div class="file-card file-card--skill">
          <span class="file-card-icon">⚡</span>
          <div class="file-card-info">
            <span class="file-card-name">Skill</span>
            <code class="file-card-ext">SKILL.md</code>
          </div>
        </div>
        <div class="file-card file-card--prompt">
          <span class="file-card-icon">💬</span>
          <div class="file-card-info">
            <span class="file-card-name">Prompt</span>
            <code class="file-card-ext">.prompt.md</code>
          </div>
        </div>
        <div class="file-card file-card--instructions">
          <span class="file-card-icon">📋</span>
          <div class="file-card-info">
            <span class="file-card-name">Instructions</span>
            <code class="file-card-ext">.instructions.md</code>
          </div>
        </div>
      </div>
    </div>

    <!-- Toggle -->
    <div class="popup-section popup-section--last">
      <div class="toggle-row">
        <span class="toggle-label">Extension Active</span>
        <label class="toggle-switch">
          <input type="checkbox" id="enabled-checkbox">
          <span class="toggle-track"></span>
        </label>
      </div>
      <div id="status" class="status"></div>
    </div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
